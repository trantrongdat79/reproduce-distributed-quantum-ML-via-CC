# Copy this file to config/cc_dqml.yaml for local runs.

project:
  name: reproduce-distributed-quantum-ml-via-cc
  target: figure_4_and_table_1

experiment:
  model: cc_dqml
  output_dir: results/sprint1_cc_dqml
  dataset_seed: 0
  init_seed: 0

data:
  n_features: 8
  n_samples: 2048
  n_clusters: 32
  train_size: 1536
  validation_size: 512
  sphere_radius: 0.7853981633974483

model:
  qpus: 2
  qubits_per_qpu: 4
  convolutional_sub_layers: 3
  communication: classical
  interpret_weights_initial: [1.0, -1.0, -1.0, 1.0]

training:
  optimizer: adam
  learning_rate: 0.05
  batch_size: 32
  iterations: 10

reproduction_targets:
  sprint1_smoke_test:
    models: [cc_dqml]
    convolutional_sub_layers: [3]
    dataset_trials: 1
    initialization_trials: 1
  full_table_1:
    models: [non_dqml, nc_dqml, cc_dqml, qc_dqml]
    convolutional_sub_layers: [3, 5, 7, 9, 15, 20]
    dataset_trials: 3
    initialization_trials: 10
    iterations: 1000
